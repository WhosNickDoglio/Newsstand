[versions]
kotlin = "1.4.32"
android-gradle = "4.1.3"
dagger = "2.33"
detekt = "1.16.0"
anvil = "2.2.0"
coroutines = "1.4.3"
okhttp = "4.9.1"
retrofit = "2.9.0"
moshi = "1.12.0"
sqldelight = "1.4.4"
lifecycle = "2.3.1"
workflow = "1.0.0-alpha.12"

[libraries]
paging = { module = "androidx.paging:paging-runtime", version = "3.0.0-beta03" }
appcompat = { module = "androidx.appcompat:appcompat", version = "1.2.0" }
constraint-layout = { module = "androidx.constraintlayout:constraintlayout", version = "2.0.4" }
core-ktx = { module = "androidx.core:core-ktx", version = "1.3.2" }
recyclerview = { module = "androidx.recyclerview:recyclerview", version = "1.1.0" }
dagger-core = { module = "com.google.dagger:dagger", version.ref = "dagger" }
dagger-compiler = { module = "com.google.dagger:dagger-compiler", version.ref = "dagger" }
timber = { module = "com.jakewharton.timber:timber", version = "4.7.1" }
detekt-formatting = { module = "io.gitlab.arturbosch.detekt:detekt-formatting", version.ref = "detekt" }
coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
coroutines-android = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "coroutines" }
material = { module = "com.google.android.material:material", version = "1.3.0" }
okhttp-core = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp" }
okhttp-logging = { module = "com.squareup.okhttp3:logging-interceptor", version.ref = "okhttp" }
retrofit-core = { module = "com.squareup.retrofit2:retrofit", version.ref = "retrofit" }
retrofit-converter-moshi = { module = "com.squareup.retrofit2:converter-moshi", version.ref = "retrofit" }
moshi-core = { module = "com.squareup.moshi:moshi", version.ref = "moshi" }
moshi-codegen = { module = "com.squareup.moshi:moshi-kotlin-codegen", version.ref = "moshi" }
eithernet = { module = "com.slack.eithernet:eithernet", version = "0.2.0" }
sqldelight-android = { module = "com.squareup.sqldelight:android-driver", version.ref = "sqldelight" }
sqldelight-coroutines = { module = "com.squareup.sqldelight:coroutines-extensions-jvm", version.ref = "sqldelight" }
sqldelight-jvm = { module = "com.squareup.sqldelight:sqlite-driver", version.ref = "sqldelight" }
coil = { module = "io.coil-kt:coil", version = "1.1.1" }
datastore = { module = "androidx.datastore:datastore-preferences", version = "1.0.0-alpha06" }
lifecycle-viewmodel = { module = "androidx.lifecycle:lifecycle-viewmodel-ktx", version.ref = "lifecycle" }
lifecycle-common = { module = "androidx.lifecycle:lifecycle-common-java8", version.ref = "lifecycle" }
activity = { module = "androidx.activity:activity-ktx", version = "1.2.2" }
viewpager = { module = "androidx.viewpager2:viewpager2", version = "1.0.0" }
swiperefreshlayout = { module = "androidx.swiperefreshlayout:swiperefreshlayout", version = "1.1.0" }
cardview = { module = "androidx.cardview:cardview", version = "1.0.0" }
insetter = { module = "dev.chrisbanes.insetter:insetter", version = "0.5.0" }
junit = { module = "junit:junit", version = "4.13.2" }
truth = { module = "com.google.truth:truth", version = "1.1.2" }
leakcanary = { module = "com.squareup.leakcanary:leakcanary-android", version = "2.7" }
desugar = { module = "com.android.tools:desugar_jdk_libs", version = "1.1.1" }
workflow-core = { module = "com.squareup.workflow1:workflow-core-jvm", version.ref = "workflow" }
workflow-android-ui = { module = "com.squareup.workflow1:workflow-ui-core-android", version.ref = "workflow" }
workflow-modal = { module = "com.squareup.workflow1:workflow-ui-modal-android", version.ref = "workflow" }
workflow-backstack = { module = "com.squareup.workflow1:workflow-ui-backstack-android", version.ref = "workflow" }
workflow-test = { module = "com.squareup.workflow1:workflow-testing-jvm", version.ref = "workflow" }

#[bundles]
#workflow = ["workflow.core", "workflow.android.ui", "workflow.modal", "workflow.backstack"]
